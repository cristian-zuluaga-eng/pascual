<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- PASCUAL Bot - Azul cyan (#00d9ff) - Saltando -->

  <!-- Sombra en el suelo -->
  <ellipse cx="32" cy="58" rx="14" ry="3" fill="#00d9ff" opacity="0.2">
    <animate attributeName="rx" values="14;10;14" dur="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.1;0.2" dur="0.6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Bot con animacion de salto -->
  <g>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0; 0,-5; 0,0"
      dur="0.6s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"
    />

    <!-- Antena -->
    <line x1="32" y1="18" x2="32" y2="10" stroke="#00d9ff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="32" cy="8" r="4" fill="#00d9ff">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>

    <!-- Cuerpo principal -->
    <rect x="14" y="18" width="36" height="28" rx="4" stroke="#00d9ff" stroke-width="3" fill="none"/>

    <!-- Ojos -->
    <circle cx="24" cy="32" r="4" fill="#00d9ff">
      <animate attributeName="r" values="4;3;4" dur="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="32" r="4" fill="#00d9ff">
      <animate attributeName="r" values="4;3;4" dur="0.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Pies -->
    <rect x="18" y="46" width="10" height="8" rx="2" stroke="#00d9ff" stroke-width="3" fill="none"/>
    <rect x="36" y="46" width="10" height="8" rx="2" stroke="#00d9ff" stroke-width="3" fill="none"/>
  </g>
</svg>
